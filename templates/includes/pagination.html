{% if page_obj.paginator.num_pages > 1 %}
<nav class="site-pagination mt-12 flex items-center justify-between gap-4 border-t border-white/10 pt-6" aria-label="Pagination">
    <div>
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' and value %}&{{ key }}={{ value|urlencode }}{% endif %}{% endfor %}" class="site-pagination-link rounded-full border border-white/10 px-4 py-2 text-sm text-slate-200 transition hover:border-white/30 hover:text-white">Previous</a>
        {% endif %}
    </div>
    <p class="text-sm text-slate-400">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</p>
    <div>
        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' and value %}&{{ key }}={{ value|urlencode }}{% endif %}{% endfor %}" class="site-pagination-link rounded-full border border-white/10 px-4 py-2 text-sm text-slate-200 transition hover:border-white/30 hover:text-white">Next</a>
        {% endif %}
    </div>
</nav>
{% endif %}
