{% extends "dashboard/base.html" %}

{% block page_actions %}
    <a href="{% url 'portfolio_app:dashboard_edit' 'email-campaigns' campaign.pk %}" class="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 shadow-sm">Back to Campaign</a>
{% endblock %}

{% block dashboard_content %}
<section class="grid gap-6 xl:grid-cols-[1.2fr_0.8fr]">
    <article class="overflow-hidden rounded-[1.9rem] border border-white/70 bg-white/90 shadow-[0_18px_45px_rgba(15,23,42,0.06)]">
        <div class="border-b border-slate-200 bg-slate-50/90 px-6 py-4">
            <p class="text-[11px] font-bold uppercase tracking-[0.24em] text-slate-500">Rendered Email</p>
            <h2 class="mt-2 font-['Space_Grotesk'] text-2xl font-bold text-slate-950">{{ campaign.subject }}</h2>
        </div>
        <iframe
            title="Email preview"
            class="min-h-[900px] w-full bg-white"
            srcdoc="{{ html_body|escape }}"
        ></iframe>
    </article>

    <aside class="space-y-6">
        <section class="rounded-[1.9rem] border border-white/70 bg-white/90 p-6 shadow-[0_18px_45px_rgba(15,23,42,0.06)]">
            <p class="text-[11px] font-bold uppercase tracking-[0.24em] text-slate-500">Text Version</p>
            <pre class="mt-4 whitespace-pre-wrap text-sm leading-7 text-slate-700">{{ text_body }}</pre>
        </section>
        <section class="rounded-[1.9rem] border border-white/70 bg-white/90 p-6 shadow-[0_18px_45px_rgba(15,23,42,0.06)]">
            <p class="text-[11px] font-bold uppercase tracking-[0.24em] text-slate-500">Campaign Notes</p>
            <p class="mt-3 text-sm leading-7 text-slate-600">{{ campaign.internal_notes|default:"No internal notes added yet." }}</p>
        </section>
    </aside>
</section>
{% endblock %}
