{% extends "admin/base_site.html" %}

{% block content %}
    <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px;">
        <div>
            <h1 style="margin-bottom:6px;">{{ campaign.title }}</h1>
            <p style="margin:0;color:#64748b;">Subject: {{ campaign.subject }}</p>
        </div>
        <a href="{% url 'admin:portfolio_app_emailcampaign_change' campaign.pk %}" class="button">Back to campaign</a>
    </div>

    <div style="display:grid;gap:24px;grid-template-columns:minmax(0,1.3fr) minmax(320px,0.7fr);align-items:start;">
        <section style="background:#fff;border:1px solid #e2e8f0;border-radius:18px;overflow:hidden;">
            <iframe title="Email preview" style="width:100%;min-height:900px;border:0;background:#fff;" srcdoc="{{ html_body|escape }}"></iframe>
        </section>
        <section style="background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:20px;">
            <h2 style="margin-top:0;">Text version</h2>
            <pre style="white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.7;">{{ text_body }}</pre>
        </section>
    </div>
{% endblock %}
